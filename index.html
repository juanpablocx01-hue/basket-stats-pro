<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Básquet Analytics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/heatmap.js/2.0.0/heatmap.min.js"></script>
</head>
<body style="max-width: 1200px !important; margin: 0 auto;">
    <h1 style="font-size: 1.5em; margin: 10px 0;">Estadísticas de Básquetbol</h1>
    <p style="margin: 5px 0;">Estado: <span id="estado-conexion">Conectando...</span></p>
    
    <div style="margin-bottom: 10px; border-bottom: 2px solid #ddd; padding-bottom: 10px; display: flex; gap: 10px; flex-wrap: wrap;">
        <button id="nav-partido" class="btn" style="background-color: #333; margin: 0; padding: 8px 15px;">🏀 Partido</button>
        <button id="nav-historial" class="btn" style="background-color: #888; margin: 0; padding: 8px 15px;">📜 Historial</button>
        <button id="nav-temporada" class="btn" style="background-color: #888; margin: 0; padding: 8px 15px;">🏆 Temporada</button>
        <button id="nav-admin" class="btn" style="background-color: #888; margin: 0; padding: 8px 15px;">⚙️ Admin</button>
    </div>

    <div id="seccion-partido">
        <div id="panel-configuracion">
            <h2>1. Configurar Partido</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px;">
                <div style="flex: 1; min-width: 150px;"><label>Equipo Local:</label><br><select id="select-local" style="width: 100%; padding: 8px;"><option value="">Cargando...</option></select></div>
                <div style="flex: 1; min-width: 150px;"><label>Equipo Visitante:</label><br><select id="select-visitante" style="width: 100%; padding: 8px;"><option value="">Cargando...</option></select></div>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <div style="flex: 1; min-width: 120px;"><label>📅 Fecha:</label><br><input type="date" id="config-fecha" style="width: 100%; padding: 8px;"></div>
                <div style="flex: 1; min-width: 120px;"><label>🏆 Torneo:</label><br><input type="text" id="config-torneo" style="width: 100%; padding: 8px;"></div>
                <div style="flex: 1; min-width: 120px;"><label>📍 Cancha:</label><br><input type="text" id="config-cancha" style="width: 100%; padding: 8px;"></div>
                <div style="flex: 1; min-width: 120px;"><label>⏱️ Min/Cuarto:</label><br>
                    <select id="config-minutos" style="width: 100%; padding: 8px;"><option value="12">12 Min</option><option value="10">10 Min</option></select>
                </div>
            </div>
            <button id="btn-iniciar-partido" class="btn" style="background-color: #007bff; width: 100%; padding: 15px; font-weight: bold;">Iniciar Partido</button>
        </div>

        <div id="panel-captura" class="oculto">
            <div style="display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 10px; border-radius: 8px; margin-bottom: 5px; border-left: 5px solid #333; flex-wrap: nowrap; gap: 10px;">
                <div style="flex: 0 1 auto;">
                    <h2 style="margin: 0; font-size: 1.1em;">Comando</h2>
                    <select id="select-periodo" style="padding: 3px; font-size: 0.8em; margin-top: 5px;">
                        <option value="Q1">1Q</option><option value="Q2">2Q</option><option value="Q3">3Q</option><option value="Q4">4Q</option><option value="OT">OT</option>
                    </select>
                </div>

                <div class="marcador-contenedor" style="flex: 1; justify-content: center; gap: 10px;">
                    <div style="text-align: center;"><div class="nombre-score" id="nombre-score-local" style="font-size: 0.7em;">L</div><div id="score-local" class="caja-score" style="font-size: 1.8em; padding: 5px 10px;">0</div></div>
                    <div style="text-align: center;">
                        <div id="pantalla-reloj" class="reloj-digital reloj-pausado" style="font-size: 1.8em; padding: 5px 10px;">12:00</div>
                        <!-- NUEVOS BOTONES DE AJUSTE -->
                        <div style="display: flex; gap: 4px; justify-content: center; margin-top: 4px;">
                            <button onclick="ajustarReloj(-10)" style="background:#dc3545; color:white; border:none; border-radius:3px; padding:2px 6px; font-size:0.7em; font-weight:bold;">-10s</button>
                            <button onclick="ajustarReloj(10)" style="background:#28a745; color:white; border:none; border-radius:3px; padding:2px 6px; font-size:0.7em; font-weight:bold;">+10s</button>
                            <button onclick="ajusteManualReloj()" style="background:#444; color:white; border:none; border-radius:3px; padding:2px 6px; font-size:0.7em;">⚙️</button>
                        </div>
                        <button id="btn-toggle-reloj" class="btn" style="background-color: #28a745; padding: 4px 15px; margin-top: 5px; font-size: 0.8em; width: 80px;">▶ Play</button>
                    </div>
                    <div style="text-align: center;"><div class="nombre-score" id="nombre-score-visitante" style="font-size: 0.7em;">V</div><div id="score-visitante" class="caja-score" style="font-size: 1.8em; padding: 5px 10px;">0</div></div>
                </div>

                <div><button id="btn-ver-estadisticas" class="btn" style="background-color: #17a2b8; padding: 10px; font-size: 0.8em;">📊 Stats</button></div>
            </div>

            <div class="layout-u" style="gap: 5px;">
                <div class="columna-roster" style="flex: 0 0 160px;">
                    <h3 id="titulo-equipo-local" class="titulo-equipo" style="font-size: 0.9em; padding: 5px;">Local</h3>
                    <div class="zona-cancha"><p class="titulo-zona" style="font-size: 0.7em;">🟢 Cancha</p><div id="grid-local-cancha" class="grid-jugadores"></div></div>
                    <div class="zona-banca"><p class="titulo-zona" style="font-size: 0.7em;">🪑 Banca</p><div id="grid-local-banca" class="grid-jugadores"></div></div>
                </div>

                <div class="columna-centro" style="max-width: 400px;">
                    <div id="cancha-wrapper" style="position: relative; width: 100%;">
                        <div id="cancha" class="cancha-basquet" style="max-width: 350px;"></div>
                        <div id="acciones-tiro" class="menu-flotante oculto">
                            <select id="select-puntos" style="font-size: 0.8em;"><option value="2">2 Pts</option><option value="3">3 Pts</option></select>
                            <div class="botones-flotantes"><button id="btn-acierto" class="btn acierto">✅</button><button id="btn-fallo" class="btn fallo">❌</button></div>
                        </div>
                        <div id="menu-asistencia" class="menu-flotante oculto">
                            <div id="lista-asistencias"></div>
                            <button class="btn-asist btn-sin-asist" id="btn-sin-asistencia">🚫 Sin Ast</button>
                        </div>
                    </div>

                    <div id="acciones-rapidas" style="margin-top: 5px; padding: 8px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 5px; width: 100%;">
                        <div style="display: flex; gap: 4px; flex-wrap: wrap; justify-content: center;">
                            <button class="btn-accion btn" data-tipo="TL" data-res="Acierto" style="background-color: #28a745; font-size:0.75em; padding: 5px;">✅ TL</button>
                            <button class="btn-accion btn" data-tipo="TL" data-res="Fallo" style="background-color: #dc3545; font-size:0.75em; padding: 5px;">❌ TL</button>
                            <button class="btn-accion btn" data-tipo="Rebote" data-res="Ofensivo" style="background-color: #f39c12; font-size:0.75em; padding: 5px;">R.Of</button>
                            <button class="btn-accion btn" data-tipo="Rebote" data-res="Defensivo" style="background-color: #e67e22; font-size:0.75em; padding: 5px;">R.Def</button>
                            <button class="btn-accion btn" data-tipo="Robo" data-res="Balon" style="background-color: #2ecc71; font-size:0.75em; padding: 5px;">Robo</button>
                            <button class="btn-accion btn" data-tipo="Perdida" data-res="Balon" style="background-color: #e74c3c; font-size:0.75em; padding: 5px;">Perd</button>
                            <button class="btn-accion btn" data-tipo="Falta" data-res="Personal" style="background-color: #9b59b6; font-size:0.75em; padding: 5px;">Falt</button>
                        </div>
                    </div>

                    <div id="play-by-play-container" style="margin-top: 5px; padding: 5px;">
                        <h3 style="margin: 0; font-size: 0.9em;">📜 Play-by-Play</h3>
                        <div id="lista-pbp" style="max-height: 120px; font-size: 0.8em;"></div>
                    </div>
                </div>

                <div class="columna-roster" style="flex: 0 0 160px;">
                    <h3 id="titulo-equipo-visitante" class="titulo-equipo" style="font-size: 0.9em; padding: 5px;">Visit</h3>
                    <div class="zona-cancha"><p class="titulo-zona" style="font-size: 0.7em;">🟢 Cancha</p><div id="grid-visitante-cancha" class="grid-jugadores"></div></div>
                    <div class="zona-banca"><p class="titulo-zona" style="font-size: 0.7em;">🪑 Banca</p><div id="grid-visitante-banca" class="grid-jugadores"></div></div>
                </div>
            </div>
        </div>
        <!-- ... resto de paneles del dashboard ... -->
        <div id="panel-dashboard" class="oculto">
             <!-- (Contenido del dashboard se mantiene igual) -->
             <button id="btn-volver-cancha" class="btn" style="background-color: gray;">⬅ Volver</button>
             <div id="tabla-estadisticas-contenedor">
                <table id="tabla-estadisticas"><tbody id="tabla-estadisticas-cuerpo"></tbody></table>
             </div>
        </div>
    </div>

    <div id="seccion-historial" class="oculto">
        <h2>📜 Historial</h2>
        <tbody id="tabla-historial"></tbody>
    </div>

    <script src="app.js"></script>
</body>
</html>
