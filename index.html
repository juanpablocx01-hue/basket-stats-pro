<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Básquet Analytics Master</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/heatmap.js/2.0.0/heatmap.min.js"></script>
</head>
<body style="max-width: 1200px !important; margin: 0 auto;">
    <h1 style="text-align: center; font-size: 1.4em;">Básquet Analytics PRO</h1>
    <p style="text-align: center; margin: 5px 0;">Estado: <span id="estado-conexion">Conectando...</span></p>
    
    <div style="margin-bottom: 10px; border-bottom: 2px solid #ddd; padding-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;">
        <button id="nav-partido" class="btn" style="background-color: #333; margin: 0;">🏀 Partido</button>
        <button id="nav-historial" class="btn" style="background-color: #888; margin: 0;">📜 Historial</button>
        <button id="nav-temporada" class="btn" style="background-color: #888; margin: 0;">🏆 Temporada</button>
        <button id="nav-admin" class="btn" style="background-color: #888; margin: 0;">⚙️ Admin</button>
    </div>

    <!-- SECCION REGISTRO PARTIDO -->
    <div id="seccion-partido">
        <div id="panel-configuracion">
            <h3>1. Configurar Encuentro</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;">
                <div style="flex: 1; min-width: 150px;"><label>Local:</label><br><select id="select-local" style="width: 100%; padding: 8px;"><option value="">Cargando...</option></select></div>
                <div style="flex: 1; min-width: 150px;"><label>Visitante:</label><br><select id="select-visitante" style="width: 100%; padding: 8px;"><option value="">Cargando...</option></select></div>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <div style="flex: 1; min-width: 120px;"><label>📅 Fecha:</label><br><input type="date" id="config-fecha" style="width: 100%; padding: 8px;"></div>
                <div style="flex: 1; min-width: 120px;"><label>🏆 Torneo:</label><br><input type="text" id="config-torneo" style="width: 100%; padding: 8px;"></div>
                <div style="flex: 1; min-width: 120px;"><label>⏱️ Min/Cuarto:</label><br><select id="config-minutos" style="width: 100%; padding: 8px;"><option value="12">12 Min</option><option value="10">10 Min</option></select></div>
            </div>
            <button id="btn-iniciar-partido" class="btn" style="background-color: #007bff; width: 100%; padding: 12px; font-weight: bold;">Iniciar Partido</button>
        </div>

        <div id="panel-captura" class="oculto">
            <!-- CABECERA MARCADOR -->
            <div style="display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 8px; border-radius: 8px; margin-bottom: 8px; border-left: 5px solid #333;">
                <div style="text-align: center;"><div class="nombre-score" id="nombre-score-local" style="font-size:0.8em; font-weight:bold;">LOCAL</div><div id="score-local" class="caja-score">0</div></div>
                
                <div style="text-align: center;">
                    <div id="pantalla-reloj" class="reloj-digital reloj-pausado">12:00</div>
                    <!-- NUEVOS BOTONES DE AJUSTE RELOJ -->
                    <div style="margin-top: 5px; display: flex; gap: 5px; justify-content: center;">
                        <button onclick="ajustarReloj(-10)" style="background:#dc3545; color:white; border:none; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:0.75em;">-10s</button>
                        <button id="btn-toggle-reloj" style="background:#28a745; color:white; border:none; padding:4px 15px; border-radius:4px; font-weight:bold; font-size:0.8em;">PLAY</button>
                        <button onclick="ajustarReloj(10)" style="background:#28a745; color:white; border:none; padding:4px 8px; border-radius:4px; font-weight:bold; font-size:0.75em;">+10s</button>
                        <button onclick="ajusteManualReloj()" style="background:#444; color:white; border:none; padding:4px 8px; border-radius:4px; font-size:0.75em;">⚙️</button>
                    </div>
                </div>

                <div style="text-align: center;"><div class="nombre-score" id="nombre-score-visitante" style="font-size:0.8em; font-weight:bold;">VISIT</div><div id="score-visitante" class="caja-score">0</div></div>
            </div>

            <div class="layout-u">
                <!-- ROSTER LOCAL -->
                <div class="columna-roster">
                    <h4 id="titulo-equipo-local" style="margin: 0; text-align: center; font-size: 0.9em; background: #ddd; padding: 4px; border-radius: 4px;">Local</h4>
                    <div class="zona-cancha"><p class="titulo-zona">🟢 Cancha</p><div id="grid-local-cancha"></div></div>
                    <div class="zona-banca"><p class="titulo-zona">🪑 Banca</p><div id="grid-local-banca"></div></div>
                </div>

                <!-- CANCHA Y ACCIONES -->
                <div class="columna-centro">
                    <div id="cancha-wrapper" style="position: relative;">
                        <div id="cancha" class="cancha-basquet"></div>
                        <div id="acciones-tiro" class="menu-flotante oculto">
                            <select id="select-puntos" style="width:100%; margin-bottom:5px;"><option value="2">2 Pts</option><option value="3">3 Pts</option></select>
                            <div style="display:flex; gap:5px;"><button id="btn-acierto" class="btn acierto" style="flex:1;">✅</button><button id="btn-fallo" class="btn fallo" style="flex:1;">❌</button></div>
                        </div>
                        <div id="menu-asistencia" class="menu-flotante oculto"><div id="lista-asistencias"></div><button id="btn-sin-asistencia" class="btn" style="background:gray; width:100%; margin-top:5px; font-size:0.8em;">Sin AST</button></div>
                    </div>

                    <!-- BOTONES ACCION RAPIDA -->
                    <div id="acciones-rapidas" style="margin-top: 10px; padding: 10px; background: #fff; border: 1px solid #ddd; border-radius: 8px;">
                        <div style="display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;">
                            <button class="btn-accion btn" data-tipo="TL" data-res="Acierto" style="background:#28a745; font-size:0.75em; padding: 5px 10px;">✅ TL</button>
                            <button class="btn-accion btn" data-tipo="TL" data-res="Fallo" style="background:#dc3545; font-size:0.75em; padding: 5px 10px;">❌ TL</button>
                            <button class="btn-accion btn" data-tipo="Rebote" data-res="Ofensivo" style="background:#f39c12; font-size:0.75em;">R.Of</button>
                            <button class="btn-accion btn" data-tipo="Rebote" data-res="Defensivo" style="background:#e67e22; font-size:0.75em;">R.Def</button>
                            <button class="btn-accion btn" data-tipo="Asistencia" data-res="Exitosa" style="background:#3498db; font-size:0.75em;">AST</button>
                            <button class="btn-accion btn" data-tipo="Robo" data-res="Balon" style="background:#2ecc71; font-size:0.75em;">ROBO</button>
                            <button class="btn-accion btn" data-tipo="Perdida" data-res="Balon" style="background:#e74c3c; font-size:0.75em;">PERD</button>
                            <button class="btn-accion btn" data-tipo="Falta" data-res="Personal" style="background:#9b59b6; font-size:0.75em;">FALT</button>
                        </div>
                        <button id="btn-ver-estadisticas" class="btn" style="background:#17a2b8; width:100%; margin-top:10px; font-weight:bold;">📊 VER BOX SCORE MASTER</button>
                    </div>
                </div>

                <!-- ROSTER VISITANTE -->
                <div class="columna-roster">
                    <h4 id="titulo-equipo-visitante" style="margin: 0; text-align: center; font-size: 0.9em; background: #ddd; padding: 4px; border-radius: 4px;">Visita</h4>
                    <div class="zona-cancha"><p class="titulo-zona">🟢 Cancha</p><div id="grid-visitante-cancha"></div></div>
                    <div class="zona-banca"><p class="titulo-zona">🪑 Banca</p><div id="grid-visitante-banca"></div></div>
                </div>
            </div>
        </div>
        
        <!-- DASHBOARD (OCULTO) -->
        <div id="panel-dashboard" class="oculto">
            <h2>Box Score Master <span id="lbl-partido-id"></span></h2>
            <button id="btn-volver-cancha" class="btn" style="background:gray;">⬅ Volver</button>
            <!-- Tablas y charts mantenidos según Fuente 1 -->
            <div id="contenedor-tarjetas" class="tarjetas-ratio-container"></div>
            <div id="tabla-estadisticas-contenedor">
                <table id="tabla-estadisticas"><thead><tr><th>Jugador</th><th>PTS</th><th>TL</th><th>2P</th><th>3P</th><th>REB</th><th>AST</th><th>ROB</th><th>PER</th><th>FLT</th><th>+/-</th></tr></thead><tbody id="tabla-estadisticas-cuerpo"></tbody></table>
            </div>
        </div>
    </div>

    <!-- OTRAS SECCIONES (HISTORIAL, ADMIN) MANTENIDAS DE FUENTE 3 -->
    <div id="seccion-historial" class="oculto">...</div>
    <div id="seccion-admin" class="oculto">...</div>

    <script src="app.js"></script>
</body>
</html>
