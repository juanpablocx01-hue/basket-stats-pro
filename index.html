<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Básquet Analytics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/heatmap.js/2.0.0/heatmap.min.js"></script>
</head>
<body style="max-width: 1200px !important; margin: 0 auto;">
    <h1>Estadísticas de Básquetbol</h1>
    <p style="margin-bottom: 10px;">Estado: <span id="estado-conexion">Conectando...</span></p>
    
    <div style="margin-bottom: 15px; border-bottom: 2px solid #ddd; padding-bottom: 10px; display: flex; gap: 8px; flex-wrap: wrap;">
        <button id="nav-partido" class="btn" style="background-color: #333; margin: 0;">🏀 Partido</button>
        <button id="nav-historial" class="btn" style="background-color: #888; margin: 0;">📜 Historial</button>
        <button id="nav-temporada" class="btn" style="background-color: #888; margin: 0;">🏆 Temporada</button>
        <button id="nav-admin" class="btn" style="background-color: #888; margin: 0;">⚙️ Admin</button>
    </div>

    <div id="seccion-partido">
        <div id="panel-configuracion">
            <h2>1. Configurar Partido</h2>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px;">
                <div style="flex: 1; min-width: 150px;"><label>Local:</label><br><select id="select-local" style="width: 100%; padding: 8px;"><option value="">Cargando...</option></select></div>
                <div style="flex: 1; min-width: 150px;"><label>Visitante:</label><br><select id="select-visitante" style="width: 100%; padding: 8px;"><option value="">Cargando...</option></select></div>
            </div>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 8px; border: 1px solid #ddd;">
                <div style="flex: 1; min-width: 120px;"><label>📅 Fecha:</label><br><input type="date" id="config-fecha" style="width: 100%; padding: 8px;"></div>
                <div style="flex: 1; min-width: 120px;"><label>🏆 Torneo:</label><br><input type="text" id="config-torneo" style="width: 100%; padding: 8px;"></div>
                <div style="flex: 1; min-width: 120px;"><label>⏱️ Min/Cuarto:</label><br>
                    <select id="config-minutos" style="width: 100%; padding: 8px;"><option value="12">12 Min</option><option value="10">10 Min</option></select>
                </div>
            </div>
            <button id="btn-iniciar-partido" class="btn" style="background-color: #007bff; width: 100%; padding: 12px; font-weight: bold;">Iniciar Partido</button>
        </div>

        <div id="panel-captura" class="oculto">
            <div style="display: flex; justify-content: space-between; align-items: center; background: #e9ecef; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 5px solid #333;">
                <div class="marcador-contenedor">
                    <div><div class="nombre-score" id="nombre-score-local">LOCAL</div><div id="score-local" class="caja-score">0</div></div>
                    <div style="text-align: center;">
                        <div id="pantalla-reloj" class="reloj-digital reloj-pausado">12:00</div>
                        <div style="margin-top: 5px; display: flex; flex-direction: column; align-items: center; gap: 5px;">
                            <button id="btn-toggle-reloj" class="btn" style="background-color: #28a745; padding: 5px 20px; font-weight: bold;">▶ Play</button>
                            <!-- BOTONES DE AJUSTE DE TIEMPO -->
                            <div class="controles-reloj-ajuste">
                                <button class="btn-reloj-mini" style="background: #dc3545;" onclick="ajustarReloj(-10)">-10s</button>
                                <button class="btn-reloj-mini" style="background: #28a745;" onclick="ajustarReloj(10)">+10s</button>
                                <button class="btn-reloj-mini" onclick="ajusteManualReloj()">⚙️ Ajustar</button>
                            </div>
                        </div>
                    </div>
                    <div><div class="nombre-score" id="nombre-score-visitante">VISIT</div><div id="score-visitante" class="caja-score">0</div></div>
                </div>
                <div style="display: flex; flex-direction: column; gap: 5px;">
                    <select id="select-periodo" style="padding: 5px;"><option value="Q1">1Q</option><option value="Q2">2Q</option><option value="Q3">3Q</option><option value="Q4">4Q</option><option value="OT">OT</option></select>
                    <button id="btn-ver-estadisticas" class="btn" style="background-color: #17a2b8; padding: 5px;">📊 Stats</button>
                </div>
            </div>

            <div class="layout-u">
                <div class="columna-roster">
                    <h3 id="titulo-equipo-local" class="titulo-equipo">Local</h3>
                    <div class="zona-cancha"><p class="titulo-zona">🟢 Cancha</p><div id="grid-local-cancha" class="grid-jugadores"></div></div>
                    <div class="zona-banca"><p class="titulo-zona">🪑 Banca</p><div id="grid-local-banca" class="grid-jugadores"></div></div>
                </div>

                <div class="columna-centro">
                    <div id="cancha-wrapper" style="position: relative; width: 100%;">
                        <div id="cancha" class="cancha-basquet"></div>
                        <div id="acciones-tiro" class="menu-flotante oculto">
                            <select id="select-puntos"><option value="2">2 Pts</option><option value="3">3 Pts</option></select>
                            <div class="botones-flotantes"><button id="btn-acierto" class="btn acierto">✅</button><button id="btn-fallo" class="btn fallo">❌</button></div>
                        </div>
                        <div id="menu-asistencia" class="menu-flotante oculto"><div id="lista-asistencias"></div><button class="btn-asist btn-sin-asist" id="btn-sin-asistencia">🚫 Sin AST</button></div>
                    </div>

                    <div id="acciones-rapidas" style="margin-top: 10px; padding: 8px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 5px; width: 100%;">
                        <div style="display: flex; gap: 5px; flex-wrap: wrap; justify-content: center;">
                            <button class="btn-accion btn" data-tipo="TL" data-res="Acierto" style="background-color: #28a745; font-size:0.8em;">✅ TL</button>
                            <button class="btn-accion btn" data-tipo="TL" data-res="Fallo" style="background-color: #dc3545; font-size:0.8em;">❌ TL</button>
                            <button class="btn-accion btn" data-tipo="Rebote" data-res="Ofensivo" style="background-color: #f39c12; font-size:0.8em;">R.Of</button>
                            <button class="btn-accion btn" data-tipo="Rebote" data-res="Defensivo" style="background-color: #e67e22; font-size:0.8em;">R.Def</button>
                            <button class="btn-accion btn" data-tipo="Asistencia" data-res="Exitosa" style="background-color: #3498db; font-size:0.8em;">AST</button>
                            <button class="btn-accion btn" data-tipo="Robo" data-res="Balon" style="background-color: #2ecc71; font-size:0.8em;">Robo</button>
                            <button class="btn-accion btn" data-tipo="Perdida" data-res="Balon" style="background-color: #e74c3c; font-size:0.8em;">Perd</button>
                            <button class="btn-accion btn" data-tipo="Falta" data-res="Personal" style="background-color: #9b59b6; font-size:0.8em;">Falta</button>
                        </div>
                    </div>

                    <div id="play-by-play-container">
                        <div id="lista-pbp" style="max-height: 100px; overflow-y: auto;"></div>
                    </div>
                </div>

                <div class="columna-roster">
                    <h3 id="titulo-equipo-visitante" class="titulo-equipo">Visit</h3>
                    <div class="zona-cancha"><p class="titulo-zona">🟢 Cancha</p><div id="grid-visitante-cancha" class="grid-jugadores"></div></div>
                    <div class="zona-banca"><p class="titulo-zona">🪑 Banca</p><div id="grid-visitante-banca" class="grid-jugadores"></div></div>
                </div>
            </div>
        </div>

        <div id="panel-dashboard" class="oculto">
            <h2>Box Score Master <span id="lbl-partido-id"></span></h2>
            <button id="btn-volver-cancha" class="btn" style="background-color: gray;">⬅ Volver</button>
            <div id="contenedor-tarjetas" class="tarjetas-ratio-container">
                <div class="tarjeta-ratio">eFG%: <span id="global-efg">0%</span></div>
                <div class="tarjeta-ratio">+/-: <span id="global-reb-ratio">0</span></div>
            </div>
            <div id="tabla-estadisticas-contenedor">
                <table id="tabla-estadisticas"><tbody id="tabla-estadisticas-cuerpo"></tbody></table>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 10px; justify-content: center;">
                <div id="contenedor-shotchart" class="cancha-basquet cancha-pequena"></div>
                <div id="contenedor-heatmap" class="cancha-basquet cancha-pequena"></div>
            </div>
        </div>
    </div>

    <div id="seccion-historial" class="oculto">
        <h2>📜 Historial</h2>
        <button id="btn-actualizar-historial" class="btn" style="background-color: #007bff;">🔄 Actualizar</button>
        <table border="1" style="width: 100%; border-collapse: collapse; margin-top: 10px;">
            <thead><tr><th>ID</th><th>Fecha</th><th>Torneo</th><th>Local</th><th>Visitante</th><th>Acción</th></tr></thead>
            <tbody id="tabla-historial"></tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>
