<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Básquet Analytics PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/heatmap.js/2.0.0/heatmap.min.js"></script>
</head>
<body>
    <div style="background: #222; color: white; padding: 8px; display: flex; justify-content: space-between; align-items: center;">
        <h4 style="margin:0;">🏀 Básquet PRO</h4>
        <div style="display: flex; gap: 5px;">
            <button id="nav-partido" class="btn" style="background:#444; font-size:0.7em;">Partido</button>
            <button id="nav-historial" class="btn" style="background:#444; font-size:0.7em;">Historial</button>
            <button id="nav-admin" class="btn" style="background:#444; font-size:0.7em;">Admin</button>
        </div>
        <span id="estado-conexion" style="font-size: 0.7em; color: #0f0;">Conectado</span>
    </div>

    <!-- SECCION PARTIDO -->
    <div id="seccion-partido">
        <div id="panel-configuracion" style="padding: 15px;">
            <h3>1. Configurar</h3>
            <select id="select-local" style="width:100%; padding:10px; margin-bottom:5px;"></select>
            <select id="select-visitante" style="width:100%; padding:10px; margin-bottom:10px;"></select>
            <div style="display: flex; gap: 5px; margin-bottom: 10px;">
                <input type="date" id="config-fecha" style="flex:1; padding:10px;">
                <select id="config-minutos" style="flex:1; padding:10px;"><option value="12">12 Min</option><option value="10">10 Min</option></select>
            </div>
            <button id="btn-iniciar-partido" class="btn" style="background:#007bff; width:100%; padding:15px;">INICIAR PARTIDO</button>
        </div>

        <div id="panel-captura" class="oculto">
            <!-- MARCADOR COMPACTO -->
            <div style="display: flex; justify-content: space-around; align-items: center; background: #eee; padding: 5px; border-bottom: 2px solid #ccc;">
                <div style="text-align:center;"><small id="nombre-score-local">LOC</small><div id="score-local" class="caja-score">0</div></div>
                <div style="text-align:center;">
                    <div id="pantalla-reloj" class="reloj-digital">12:00</div>
                    <div style="margin-top:4px;">
                        <button onclick="ajustarReloj(-10)" style="background:#dc3545; color:white; border:none; padding:4px 8px; border-radius:3px;">-10s</button>
                        <button id="btn-toggle-reloj" style="background:#28a745; color:white; border:none; padding:4px 12px; border-radius:3px; font-weight:bold;">PLAY</button>
                        <button onclick="ajustarReloj(10)" style="background:#28a745; color:white; border:none; padding:4px 8px; border-radius:3px;">+10s</button>
                        <button onclick="ajusteManualReloj()" style="background:#666; color:white; border:none; padding:4px 6px; border-radius:3px;">⚙️</button>
                    </div>
                    <select id="select-periodo" style="font-size:0.7em; margin-top:3px;"><option value="Q1">Q1</option><option value="Q2">Q2</option><option value="Q3">Q3</option><option value="Q4">Q4</option><option value="OT">OT</option></select>
                </div>
                <div style="text-align:center;"><small id="nombre-score-visitante">VIS</small><div id="score-visitante" class="caja-score">0</div></div>
            </div>

            <div class="layout-u">
                <div class="columna-roster">
                    <div class="zona-cancha"><p class="titulo-zona">EN CANCHA</p><div id="grid-local-cancha"></div></div>
                    <div class="zona-banca"><p class="titulo-zona">BANCA</p><div id="grid-local-banca"></div></div>
                </div>

                <div class="columna-centro">
                    <div id="cancha" class="cancha-basquet">
                        <div id="acciones-tiro" class="menu-flotante oculto">
                            <select id="select-puntos" style="width:100%;"><option value="2">2 Pts</option><option value="3">3 Pts</option></select>
                            <div style="display:flex; gap:4px; margin-top:5px;"><button id="btn-acierto" class="btn acierto" style="flex:1;">✅</button><button id="btn-fallo" class="btn fallo" style="flex:1;">❌</button></div>
                        </div>
                        <div id="menu-asistencia" class="menu-flotante oculto"><div id="lista-asistencias"></div><button id="btn-sin-asistencia" class="btn" style="background:gray; width:100%; margin-top:5px; font-size:0.7em;">Sin AST</button></div>
                    </div>

                    <div id="acciones-rapidas" style="margin-top:8px; display:flex; flex-wrap:wrap; gap:4px; justify-content:center;">
                        <button class="btn-accion btn" data-tipo="TL" data-res="Acierto" style="background:#28a745; font-size:0.75em;">✅ TL</button>
                        <button class="btn-accion btn" data-tipo="TL" data-res="Fallo" style="background:#dc3545; font-size:0.75em;">❌ TL</button>
                        <button class="btn-accion btn" data-tipo="Rebote" data-res="Ofensivo" style="background:#f39c12; font-size:0.75em;">R.Of</button>
                        <button class="btn-accion btn" data-tipo="Rebote" data-res="Defensivo" style="background:#e67e22; font-size:0.75em;">R.Def</button>
                        <button class="btn-accion btn" data-tipo="Perdida" data-res="Balon" style="background:#e74c3c; font-size:0.75em;">PERD</button>
                        <button class="btn-accion btn" data-tipo="Falta" data-res="Personal" style="background:#9b59b6; font-size:0.75em;">FALT</button>
                        <button id="btn-ver-estadisticas" class="btn" style="background:#17a2b8; font-size:0.75em;">📊 VER STATS</button>
                    </div>

                    <div id="play-by-play-container" style="width:100%; margin-top:10px; background:white; padding:5px; border-radius:5px;">
                        <h5 style="margin:0;">Play-by-Play</h5>
                        <div id="lista-pbp" style="max-height:80px; overflow-y:auto; font-size:0.7em;"></div>
                    </div>
                </div>

                <div class="columna-roster">
                    <div class="zona-cancha"><p class="titulo-zona">EN CANCHA</p><div id="grid-visitante-cancha"></div></div>
                    <div class="zona-banca"><p class="titulo-zona">BANCA</p><div id="grid-visitante-banca"></div></div>
                </div>
            </div>
        </div>

        <!-- DASHBOARD AVANZADO -->
        <div id="panel-dashboard" class="oculto" style="padding:10px;">
            <button id="btn-volver-cancha" class="btn" style="background:gray;">⬅ VOLVER</button>
            <h3>Box Score Master</h3>
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <div class="tarjeta-ratio">eFG%: <span id="global-efg">0%</span></div>
                <div class="tarjeta-ratio">+/-: <span id="global-reb-ratio">0</span></div>
            </div>
            <div id="tabla-estadisticas-contenedor">
                <table id="tabla-estadisticas">
                    <thead><tr><th>Jugador</th><th>PTS</th><th>+/-</th><th>TL</th><th>2P</th><th>3P</th><th>REB</th><th>AST</th><th>PER</th></tr></thead>
                    <tbody id="tabla-estadisticas-cuerpo"></tbody>
                </table>
            </div>
            <div style="display:flex; gap:10px; margin-top:10px; justify-content:center;">
                <div id="contenedor-shotchart" class="cancha-basquet" style="max-width:200px;"></div>
                <div id="contenedor-heatmap" class="cancha-basquet" style="max-width:200px;"></div>
            </div>
        </div>
    </div>

    <!-- SECCION HISTORIAL -->
    <div id="seccion-historial" class="oculto" style="padding:15px;">
        <h3>📜 Historial</h3>
        <table border="1" style="width:100%; text-align:center;">
            <thead><tr><th>ID</th><th>Fecha</th><th>Equipos</th><th>Acción</th></tr></thead>
            <tbody id="tabla-historial"></tbody>
        </table>
    </div>

    <script src="app.js"></script>
</body>
</html>
