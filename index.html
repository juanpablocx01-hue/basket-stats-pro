<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Básquet Analytics PRO</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div style="padding: 10px; background: #333; color: white; display: flex; justify-content: space-between; align-items: center;">
        <h2 style="margin: 0; font-size: 1em;">Básquet Analytics</h2>
        <span id="estado-conexion" style="font-size: 0.8em;">Conectando...</span>
    </div>

    <!-- PANEL 1: CONFIGURACIÓN -->
    <div id="panel-configuracion" style="padding: 20px;">
        <h3>1. Nuevo Partido</h3>
        <select id="select-local" style="width: 100%; padding: 10px; margin-bottom: 10px;"><option value="">Equipo Local...</option></select>
        <select id="select-visitante" style="width: 100%; padding: 10px; margin-bottom: 10px;"><option value="">Equipo Visitante...</option></select>
        <div style="display: flex; gap: 10px; margin-bottom: 10px;">
            <input type="date" id="config-fecha" style="flex: 1; padding: 10px;">
            <select id="config-minutos" style="flex: 1; padding: 10px;"><option value="12">12 Min</option><option value="10">10 Min</option></select>
        </div>
        <button id="btn-iniciar-partido" style="width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 8px; font-weight: bold;">INICIAR PARTIDO</button>
    </div>

    <!-- PANEL 2: CAPTURA (OCULTO AL INICIO) -->
    <div id="panel-captura" class="oculto">
        <div style="display: flex; justify-content: space-around; align-items: center; background: #ddd; padding: 10px;">
            <div style="text-align: center;"><div id="score-local" class="caja-score">0</div><small id="nombre-score-local">LOC</small></div>
            
            <div style="text-align: center;">
                <div id="pantalla-reloj" class="reloj-digital">12:00</div>
                <div style="margin-top: 5px;">
                    <button onclick="ajustarReloj(-10)" style="background:red; color:white; border:none; padding:5px 10px; border-radius:4px;">-10s</button>
                    <button id="btn-toggle-reloj" style="background:green; color:white; border:none; padding:5px 15px; border-radius:4px; font-weight:bold;">PLAY</button>
                    <button onclick="ajustarReloj(10)" style="background:green; color:white; border:none; padding:5px 10px; border-radius:4px;">+10s</button>
                </div>
            </div>

            <div style="text-align: center;"><div id="score-visitante" class="caja-score">0</div><small id="nombre-score-visitante">VIS</small></div>
        </div>

        <div class="layout-u">
            <div class="columna-roster">
                <div class="zona-cancha"><div id="grid-local-cancha"></div></div>
                <div class="zona-banca"><div id="grid-local-banca"></div></div>
            </div>

            <div class="columna-centro">
                <div id="cancha" class="cancha-basquet"></div>
                
                <!-- Menú de Tiro -->
                <div id="acciones-tiro" class="menu-flotante oculto">
                    <select id="select-puntos" style="width: 100%; margin-bottom: 5px;"><option value="2">2 Puntos</option><option value="3">3 Puntos</option></select>
                    <div style="display: flex; gap: 5px;">
                        <button id="btn-acierto" style="flex: 1; padding: 10px; background: green; color: white; border: none; border-radius: 5px;">✅</button>
                        <button id="btn-fallo" style="flex: 1; padding: 10px; background: red; color: white; border: none; border-radius: 5px;">❌</button>
                    </div>
                </div>

                <div id="acciones-rapidas" style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 5px; justify-content: center;">
                    <button class="btn-accion" data-tipo="TL" data-res="Acierto" style="background:green; color:white; padding: 8px;">TL ✅</button>
                    <button class="btn-accion" data-tipo="TL" data-res="Fallo" style="background:red; color:white; padding: 8px;">TL ❌</button>
                    <button class="btn-accion" data-tipo="Rebote" data-res="Ofensivo" style="background:orange; padding: 8px;">R.Of</button>
                    <button class="btn-accion" data-tipo="Rebote" data-res="Defensivo" style="background:orange; padding: 8px;">R.Def</button>
                    <button class="btn-accion" data-tipo="Perdida" data-res="Balon" style="background:#444; color:white; padding: 8px;">PERD</button>
                    <button class="btn-accion" data-tipo="Falta" data-res="Personal" style="background:purple; color:white; padding: 8px;">FALT</button>
                </div>
            </div>

            <div class="columna-roster">
                <div class="zona-cancha"><div id="grid-visitante-cancha"></div></div>
                <div class="zona-banca"><div id="grid-visitante-banca"></div></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
